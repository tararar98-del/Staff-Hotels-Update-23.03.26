    function formatDate(date = new Date(), addDays = 0) {
  const d = new Date(date);
  d.setDate(d.getDate() + addDays); // เพิ่มจำนวนวัน
  let day = d.getDate().toString().padStart(2,"0");
  let month = (d.getMonth()+1).toString().padStart(2,"0");
  let year = d.getFullYear();
  return `${day}-${month}-${year}`;
}

  renderStaff();

 const tomorrowStr = formatDate(new Date(), 1);

unsubscribeMenu = onSnapshot(doc(db,"menu", tomorrowStr), (docSnap)=>{
  if(docSnap.exists()){ 
    menu = docSnap.data();  
  } else {
    menu = {
      Morning:"❌ ยังไม่กำหนด",
      Afternoon:"❌ ยังไม่กำหนด",
      Evening:"❌ ยังไม่กำหนด",
      Night:"❌ ยังไม่กำหนด"
    };
  }
  updateMenuUI();
});
}
     
 function updateMenuUI() {
  document.querySelectorAll(".meal").forEach(el => {
    const checkbox = el.querySelector("input");
    const type = checkbox.value;

    const checked = checkbox.checked;

    const menuEl = el.querySelector(".meal-menu");
if(menuEl){
  menuEl.innerText = menu[type] || "";
}

    el.classList.toggle("active", checked);
  });
}

function toggleMeal(el) {
  const checkbox = el.querySelector("input");
  checkbox.checked = !checkbox.checked;

  const checkedCount = document.querySelectorAll(".meal input:checked").length;

  document.querySelectorAll(".meal").forEach(meal => {
    const cb = meal.querySelector("input");
    cb.disabled = !cb.checked && checkedCount >= 2;
    meal.classList.toggle("active", cb.checked);
  });
}

function renderPage() {
  clearListeners(); // 👈 ใส่ตรงนี้!!

window.register = async function() {
  if(isSubmitting) return;
  isSubmitting = true;

  const btn = document.getElementById("registerBtn");
  btn.disabled = true;
  btn.innerText = "Loading...";

  try {
    const name = document.getElementById("name").value.trim();
    const dept = document.getElementById("dept").value;

    if (!name || !dept) {
  alert("กรุณากรอกข้อมูลให้ครบ");
  btn.disabled = false;
  btn.innerText = "Register";
  isSubmitting = false;
  return;
}

if(!confirm("ยืนยันการลงทะเบียนใช่ไหม?")) {
  btn.disabled = false;
  btn.innerText = "Register";
  isSubmitting = false;
  return;
}

    const meals = [...document.querySelectorAll(".meal input:checked")].map(x => x.value);

   if (meals.length === 0 || meals.length > 2) {
  alert("เลือกได้ 1-2 มื้อ");

  btn.disabled = false;
  btn.innerText = "Register";
  isSubmitting = false;

  return;
}
    // 🔥 (แก้ข้อ 3 ด้วยด้านล่าง)
    const isDuplicate = allData.find(x => 
      x.name.toLowerCase() === name.toLowerCase() &&
      x.dept === dept
    );

   if (isDuplicate) {
  alert("คุณลงทะเบียนไปแล้วในแผนกนี้");

  btn.disabled = false;
  btn.innerText = "Register";
  isSubmitting = false;

  return;
}

const staffRef = collection(db, "staffmeal");
const newDocRef = doc(staffRef);

await setDoc(newDocRef, {
  name,
  dept,
  meals,
  time: new Date().toLocaleTimeString('en-GB'),
  date: formatDate(new Date(), 1) // บันทึกสำหรับวันถัดไป
});

   localStorage.setItem("lastRegistered", name);
   document.getElementById("msg").innerHTML =
  "<div class='success'>✔ Registration Successful</div>";

 btn.innerText = "✔ Done";

setTimeout(() => {
  btn.innerText = "Register";
}, 2000);

isSubmitting = false;
btn.disabled = false;

// 👇 เลื่อนก่อน
window.scrollTo({ top: 0, behavior: "smooth" });

// 👇 แล้วค่อย reset
resetForm();

  } catch(err) {
  console.error(err);
  alert("Error: " + err.message);

  btn.innerText = "Register";
  btn.disabled = false;
  isSubmitting = false;
}
};

// --- resetForm ---
function resetForm() {
  setTimeout(() => document.querySelector(".success")?.remove(), 3000);

  document.getElementById("name").value = ""; // 👈 ใส่ตรงนี้
  document.getElementById("dept").value = "";

  document.querySelectorAll(".meal").forEach(el => {
    el.classList.remove("active");
    el.querySelector("input").checked = false;
    el.querySelector("input").disabled = false;
  });
}

let mealsChart = null; // global chart variable

async function updateDashboardData(){
  if(unsubscribeDashboard) unsubscribeDashboard();

  const chartEl = document.getElementById("mealsChart");
  const loadingEl = document.getElementById("loading-text");

  if(chartEl) chartEl.style.opacity = "0.5";
  if(loadingEl) loadingEl.style.display = "block";

  let formattedDate;
  if(currentTab === "today"){
    formattedDate = formatDate();
  } else {
    formattedDate = formatDate(new Date(), 1);
  }

  document.getElementById("selected-date").innerText = formattedDate;

  const staffRef = query(
    collection(db, "staffmeal"),
    where("date", "==", formattedDate)
  );

  unsubscribeDashboard = onSnapshot(staffRef, snapshot => {
    if(loadingEl) loadingEl.style.display = "none";
    if(chartEl) chartEl.style.opacity = "1";

    const todayData = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));

    document.getElementById("total-staff").innerText = todayData.length;
    document.getElementById("total-meals").innerText = todayData.reduce((sum, x) => sum + x.meals.length, 0);

    const table = document.getElementById("dashboard-table");
    table.innerHTML = `
      <tr>
        <th>Name</th><th>Dept</th><th>Meals</th><th>Time</th><th>Action</th>
      </tr>
    `;

    todayData.reverse().forEach(x => {
      let row = table.insertRow();
      row.insertCell(0).innerText = x.name;
      row.insertCell(1).innerText = x.dept;
      row.insertCell(2).innerText = x.meals.join(", ");
      row.insertCell(3).innerText = x.time;
      row.insertCell(4).innerHTML = `
        <button onclick="editData('${x.id}')">Edit</button>
        <button onclick="deleteData('${x.id}')">Delete</button>
      `;
    });

    const mealCounts = { Morning:0, Afternoon:0, Evening:0, Night:0 };
    todayData.forEach(x => x.meals.forEach(m => { if(mealCounts[m]!==undefined) mealCounts[m]++; }));

    document.getElementById("count-morning").innerText = mealCounts.Morning;
    document.getElementById("count-afternoon").innerText = mealCounts.Afternoon;
    document.getElementById("count-evening").innerText = mealCounts.Evening;
    document.getElementById("count-night").innerText = mealCounts.Night;

    const ctx = chartEl.getContext('2d');
    const newData = [mealCounts.Morning, mealCounts.Afternoon, mealCounts.Evening, mealCounts.Night];

    if(mealsChart){
      mealsChart.data.datasets[0].data = newData;
      mealsChart.update();
    } else {
      mealsChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: ['Morning','Afternoon','Evening','Night'],
          datasets: [{ label:'Number of Meals', data:newData, backgroundColor:['#FFB347','#FF6961','#77DD77','#779ECB'] }]
        },
        options: { responsive:true, plugins:{ legend:{ display:false } }, scales:{ y:{ beginAtZero:true, precision:0 } } }
      });
    }
  });
}

// ปรับฟังก์ชัน exportExcel ให้ใช้วันที่ที่เลือก
window.exportExcel = async function() {
  const selectedDateInput = document.getElementById("dashboard-date");
  if(!selectedDateInput) return alert("ไม่พบวันที่");

  const selectedDate = selectedDateInput.value;
  const [year, month, day] = selectedDate.split("-");
  const formattedDate = `${day}-${month}-${year}`;

  const q = query(collection(db,"staffmeal"), where("date","==",formattedDate));
  const snapshot = await getDocs(q);

  const excelData = snapshot.docs.map(d => {
    let data = d.data();
    return {
      ...data,
      meals: data.meals.join(", ")
    };
  });

  if(excelData.length === 0) { 
    alert("No data to export"); 
    return; 
  }

  let ws = XLSX.utils.json_to_sheet(excelData, {
    header: ["name","dept","meals","time","date"]
  });

  let wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Staff Meals");
  XLSX.writeFile(wb, `StaffMeals_${formattedDate}.xlsx`);
};

function updateKitchenData() {
  if(unsubscribeKitchen) unsubscribeKitchen();

  const todayStr = formatDate();
  const tomorrowStr = formatDate(new Date(), 1);

  const staffRef = collection(db,"staffmeal");

  unsubscribeKitchen = onSnapshot(staffRef, snapshot => {
    let todayCounts = { Morning:0, Afternoon:0, Evening:0, Night:0 };
    let tomorrowCounts = { Morning:0, Afternoon:0, Evening:0, Night:0 };

    snapshot.forEach(doc => {
      const data = doc.data();

      if(data.date === todayStr){
        data.meals.forEach(m => {
          if(todayCounts[m]!==undefined) todayCounts[m]++;
        });
      }

      if(data.date === tomorrowStr){
        data.meals.forEach(m => {
          if(tomorrowCounts[m]!==undefined) tomorrowCounts[m]++;
        });
      }
    });

    // today
    document.getElementById("today-morning").innerText = todayCounts.Morning;
    document.getElementById("today-afternoon").innerText = todayCounts.Afternoon;
    document.getElementById("today-evening").innerText = todayCounts.Evening;
    document.getElementById("today-night").innerText = todayCounts.Night;

    // tomorrow
    document.getElementById("tomorrow-morning").innerText = tomorrowCounts.Morning;
    document.getElementById("tomorrow-afternoon").innerText = tomorrowCounts.Afternoon;
    document.getElementById("tomorrow-evening").innerText = tomorrowCounts.Evening;
    document.getElementById("tomorrow-night").innerText = tomorrowCounts.Night;
  });
}

if(!old){
  alert("Error: Data not found");
  return;
}

  await setDoc(docRef, {

  });

};
